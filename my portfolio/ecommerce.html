<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUXE STORE — E-Commerce</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg:#f8f5f0; --dark:#111; --accent:#c8a96e; --surface:#fff; --muted:#999; --border:#e8e3dc; }
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--dark);font-family:'Jost',sans-serif;min-height:100vh;}
  /* NAV */
  nav{display:flex;justify-content:space-between;align-items:center;padding:20px 48px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
  .logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;letter-spacing:2px;}
  .logo span{color:var(--accent);}
  .nav-right{display:flex;align-items:center;gap:32px;}
  .nav-right a{text-decoration:none;color:var(--dark);font-size:13px;letter-spacing:0.1em;text-transform:uppercase;transition:color 0.2s;}
  .nav-right a:hover{color:var(--accent);}
  .cart-btn{position:relative;background:var(--dark);color:#fff;border:none;padding:10px 20px;font-family:'Jost',sans-serif;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:background 0.2s;}
  .cart-btn:hover{background:var(--accent);}
  .cart-count{position:absolute;top:-8px;right:-8px;background:var(--accent);color:#fff;width:20px;height:20px;border-radius:50%;font-size:11px;display:flex;align-items:center;justify-content:center;}
  /* HERO */
  .hero{background:var(--dark);color:#fff;padding:80px 48px;display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center;}
  .hero h1{font-family:'Playfair Display',serif;font-size:clamp(40px,5vw,72px);font-weight:900;line-height:1;margin-bottom:20px;}
  .hero h1 em{color:var(--accent);font-style:italic;}
  .hero p{color:#aaa;line-height:1.8;margin-bottom:32px;font-size:15px;}
  .hero-img{aspect-ratio:4/3;background:linear-gradient(135deg,#1a1a1a,#2a2015);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:80px;}
  .btn-gold{background:var(--accent);color:#fff;border:none;padding:14px 32px;font-family:'Jost',sans-serif;font-size:13px;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;transition:all 0.25s;}
  .btn-gold:hover{background:#b8944e;transform:translateY(-2px);}
  /* FILTERS */
  .filters{display:flex;gap:12px;padding:32px 48px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--surface);}
  .filter-btn{padding:8px 20px;border:1px solid var(--border);background:transparent;font-family:'Jost',sans-serif;font-size:12px;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transition:all 0.2s;}
  .filter-btn.active,.filter-btn:hover{background:var(--dark);color:#fff;border-color:var(--dark);}
  /* PRODUCTS */
  .products-section{padding:48px;}
  .products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:32px;}
  .product-card{background:var(--surface);border:1px solid var(--border);overflow:hidden;transition:transform 0.3s,box-shadow 0.3s;}
  .product-card:hover{transform:translateY(-6px);box-shadow:0 20px 40px rgba(0,0,0,0.1);}
  .product-img{aspect-ratio:3/4;display:flex;align-items:center;justify-content:center;font-size:60px;position:relative;overflow:hidden;}
  .product-badge{position:absolute;top:12px;left:12px;background:var(--accent);color:#fff;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;padding:4px 10px;}
  .product-info{padding:20px;}
  .product-cat{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
  .product-name{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;margin-bottom:8px;}
  .product-price{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
  .price-new{font-size:18px;font-weight:500;color:var(--dark);}
  .price-old{font-size:14px;color:var(--muted);text-decoration:line-through;}
  .add-btn{width:100%;padding:12px;background:var(--dark);color:#fff;border:none;font-family:'Jost',sans-serif;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:background 0.2s;}
  .add-btn:hover{background:var(--accent);}
  .add-btn.added{background:#27ae60;}
  /* CART SIDEBAR */
  .cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;opacity:0;pointer-events:none;transition:opacity 0.3s;}
  .cart-overlay.open{opacity:1;pointer-events:all;}
  .cart-sidebar{position:fixed;right:0;top:0;bottom:0;width:400px;background:var(--surface);z-index:201;transform:translateX(100%);transition:transform 0.35s cubic-bezier(0.16,1,0.3,1);display:flex;flex-direction:column;}
  .cart-sidebar.open{transform:translateX(0);}
  .cart-header{padding:24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
  .cart-header h2{font-family:'Playfair Display',serif;font-size:22px;}
  .close-btn{background:none;border:none;font-size:24px;cursor:pointer;color:var(--muted);}
  .cart-items{flex:1;overflow-y:auto;padding:24px;}
  .cart-item{display:flex;gap:16px;padding:16px 0;border-bottom:1px solid var(--border);}
  .cart-item-img{width:64px;height:64px;background:var(--bg);border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;}
  .cart-item-info{flex:1;}
  .cart-item-name{font-family:'Playfair Display',serif;font-size:15px;margin-bottom:4px;}
  .cart-item-price{font-size:13px;color:var(--muted);}
  .cart-item-qty{display:flex;align-items:center;gap:8px;margin-top:8px;}
  .qty-btn{width:24px;height:24px;border:1px solid var(--border);background:none;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
  .remove-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;margin-left:auto;}
  .cart-footer{padding:24px;border-top:1px solid var(--border);}
  .cart-total{display:flex;justify-content:space-between;margin-bottom:20px;font-size:18px;}
  .cart-total span:last-child{font-family:'Playfair Display',serif;font-weight:700;}
  .checkout-btn{width:100%;padding:16px;background:var(--dark);color:#fff;border:none;font-family:'Jost',sans-serif;font-size:13px;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;transition:background 0.2s;}
  .checkout-btn:hover{background:var(--accent);}
  .empty-cart{text-align:center;padding:40px;color:var(--muted);}
  .empty-cart div{font-size:48px;margin-bottom:16px;}
  /* TOAST */
  .toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--dark);color:#fff;padding:14px 28px;font-size:13px;letter-spacing:0.05em;opacity:0;transition:all 0.3s;z-index:300;white-space:nowrap;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  @media(max-width:768px){.hero{grid-template-columns:1fr;}.hero-img{display:none;}nav{padding:16px 24px;}.products-section{padding:24px;}.filters{padding:16px 24px;}.cart-sidebar{width:100%;}}
</style>
</head>
<body>

<nav>
  <div class="logo">LUXE<span>.</span></div>
  <div class="nav-right">
    <a href="#">New In</a>
    <a href="#">Collections</a>
    <a href="#">Sale</a>
    <button class="cart-btn" onclick="toggleCart()">
      Cart <span class="cart-count" id="cartCount">0</span>
    </button>
  </div>
</nav>

<div class="hero">
  <div>
    <h1>Curated <em>Luxury</em> For Every Lifestyle</h1>
    <p>Discover our handpicked collection of premium products. Quality that speaks for itself, style that defines you.</p>
    <button class="btn-gold" onclick="document.querySelector('.products-section').scrollIntoView({behavior:'smooth'})">Shop Now →</button>
  </div>
  <div class="hero-img">🛍️</div>
</div>

<div class="filters">
  <button class="filter-btn active" onclick="filterProducts('all',this)">All</button>
  <button class="filter-btn" onclick="filterProducts('fashion',this)">Fashion</button>
  <button class="filter-btn" onclick="filterProducts('tech',this)">Tech</button>
  <button class="filter-btn" onclick="filterProducts('home',this)">Home</button>
  <button class="filter-btn" onclick="filterProducts('beauty',this)">Beauty</button>
</div>

<div class="products-section">
  <div class="products-grid" id="productsGrid"></div>
</div>

<!-- Cart -->
<div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
<div class="cart-sidebar" id="cartSidebar">
  <div class="cart-header">
    <h2>Your Cart</h2>
    <button class="close-btn" onclick="toggleCart()">×</button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-footer">
    <div class="cart-total"><span>Total</span><span id="cartTotal">R0.00</span></div>
    <button class="checkout-btn" onclick="checkout()">Proceed to Checkout</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const products = [
  { id:1, name:'Silk Evening Dress', cat:'fashion', price:1299, oldPrice:1899, emoji:'👗', bg:'#f9e8e8', badge:'Sale' },
  { id:2, name:'Premium Leather Bag', cat:'fashion', price:2499, oldPrice:null, emoji:'👜', bg:'#e8f0e8', badge:'New' },
  { id:3, name:'Wireless Headphones', cat:'tech', price:3499, oldPrice:4999, emoji:'🎧', bg:'#e8e8f9', badge:'Sale' },
  { id:4, name:'Smart Watch Elite', cat:'tech', price:5999, oldPrice:null, emoji:'⌚', bg:'#f9f0e8', badge:'New' },
  { id:5, name:'Linen Throw Pillow Set', cat:'home', price:699, oldPrice:999, emoji:'🛋️', bg:'#e8f9f0', badge:'Sale' },
  { id:6, name:'Scented Candle Collection', cat:'home', price:449, oldPrice:null, emoji:'🕯️', bg:'#f9f9e8', badge:null },
  { id:7, name:'Vitamin C Serum', cat:'beauty', price:599, oldPrice:799, emoji:'✨', bg:'#f9e8f4', badge:'Sale' },
  { id:8, name:'Perfume Luxe', cat:'beauty', price:1899, oldPrice:null, emoji:'🌸', bg:'#e8f4f9', badge:'New' },
];

let cart = [];
let currentFilter = 'all';

function renderProducts(filter) {
  const grid = document.getElementById('productsGrid');
  const filtered = filter === 'all' ? products : products.filter(p => p.cat === filter);
  grid.innerHTML = filtered.map(p => `
    <div class="product-card" data-cat="${p.cat}">
      <div class="product-img" style="background:${p.bg}">
        <span style="font-size:64px">${p.emoji}</span>
        ${p.badge ? `<div class="product-badge">${p.badge}</div>` : ''}
      </div>
      <div class="product-info">
        <div class="product-cat">${p.cat}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-price">
          <span class="price-new">R${p.price.toLocaleString()}</span>
          ${p.oldPrice ? `<span class="price-old">R${p.oldPrice.toLocaleString()}</span>` : ''}
        </div>
        <button class="add-btn" id="btn-${p.id}" onclick="addToCart(${p.id})">Add to Cart</button>
      </div>
    </div>
  `).join('');
}

function filterProducts(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderProducts(cat);
}

function addToCart(id) {
  const product = products.find(p => p.id === id);
  const existing = cart.find(i => i.id === id);
  if (existing) existing.qty++;
  else cart.push({ ...product, qty: 1 });
  updateCartUI();
  showToast(`${product.name} added to cart!`);
  const btn = document.getElementById(`btn-${id}`);
  if (btn) { btn.textContent = 'Added ✓'; btn.classList.add('added'); setTimeout(() => { btn.textContent = 'Add to Cart'; btn.classList.remove('added'); }, 1500); }
}

function updateCartUI() {
  const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
  document.getElementById('cartCount').textContent = cart.reduce((s, i) => s + i.qty, 0);
  document.getElementById('cartTotal').textContent = `R${total.toLocaleString()}`;
  const container = document.getElementById('cartItems');
  if (cart.length === 0) {
    container.innerHTML = `<div class="empty-cart"><div>🛒</div><p>Your cart is empty</p></div>`;
    return;
  }
  container.innerHTML = cart.map(item => `
    <div class="cart-item">
      <div class="cart-item-img">${item.emoji}</div>
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-price">R${item.price.toLocaleString()} each</div>
        <div class="cart-item-qty">
          <button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button>
          <span>${item.qty}</span>
          <button class="qty-btn" onclick="changeQty(${item.id},1)">+</button>
        </div>
      </div>
      <button class="remove-btn" onclick="removeItem(${item.id})">×</button>
    </div>
  `).join('');
}

function changeQty(id, delta) {
  const item = cart.find(i => i.id === id);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) removeItem(id);
  else updateCartUI();
}

function removeItem(id) {
  cart = cart.filter(i => i.id !== id);
  updateCartUI();
}

function toggleCart() {
  document.getElementById('cartSidebar').classList.toggle('open');
  document.getElementById('cartOverlay').classList.toggle('open');
}

function checkout() {
  if (cart.length === 0) { showToast('Your cart is empty!'); return; }
  showToast('Order placed! Thank you 🎉');
  cart = [];
  updateCartUI();
  toggleCart();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

renderProducts('all');
updateCartUI();
</script>
</body>
</html>
