<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Lexend:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#111318;--surface:#1a1d24;--surface2:#22262f;--border:#2a2f3a;--accent:#00ff88;--accent2:#ff6b6b;--text:#e8eaf0;--muted:#5a6070;}
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Lexend',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;gap:32px;flex-wrap:wrap;padding:32px;}
  /* CALC */
  .calculator{background:var(--surface);border:1px solid var(--border);border-radius:20px;overflow:hidden;width:340px;box-shadow:0 40px 80px rgba(0,0,0,0.5);}
  /* DISPLAY */
  .display{background:var(--bg);padding:24px;min-height:120px;display:flex;flex-direction:column;justify-content:flex-end;align-items:flex-end;border-bottom:1px solid var(--border);}
  .display-expr{font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--muted);min-height:20px;word-break:break-all;text-align:right;}
  .display-main{font-family:'Share Tech Mono',monospace;font-size:42px;font-weight:400;color:var(--text);word-break:break-all;text-align:right;line-height:1.1;transition:color 0.2s;}
  .display-main.result{color:var(--accent);}
  .display-main.error{color:var(--accent2);}
  /* MODE BAR */
  .mode-bar{display:flex;background:var(--surface2);border-bottom:1px solid var(--border);}
  .mode-btn{flex:1;padding:8px;border:none;background:transparent;color:var(--muted);font-family:'Lexend',sans-serif;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transition:all 0.2s;}
  .mode-btn.active{color:var(--accent);border-bottom:2px solid var(--accent);}
  /* BUTTONS */
  .buttons{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);}
  .btn{padding:0;aspect-ratio:1;border:none;font-family:'Lexend',sans-serif;font-size:16px;font-weight:500;cursor:pointer;transition:all 0.1s;display:flex;align-items:center;justify-content:center;background:var(--surface2);}
  .btn:hover{filter:brightness(1.3);}
  .btn:active{transform:scale(0.94);}
  .btn-num{background:var(--surface);}
  .btn-op{background:var(--surface2);color:#a8b4c8;}
  .btn-eq{background:var(--accent);color:#111;font-weight:600;}
  .btn-eq:hover{background:#00e87a;}
  .btn-clear{background:#2a1f1f;color:var(--accent2);}
  .btn-zero{grid-column:span 2;aspect-ratio:unset;padding:0 28px;justify-content:flex-start;}
  .btn-sci{background:#1a2030;color:#7eb8f7;font-size:13px;}
  /* HISTORY */
  .history-panel{background:var(--surface);border:1px solid var(--border);border-radius:20px;width:280px;height:500px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 40px 80px rgba(0,0,0,0.5);}
  .history-header{padding:20px 20px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
  .history-header h3{font-size:14px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;}
  .clear-hist{background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;font-family:'Lexend',sans-serif;}
  .clear-hist:hover{color:var(--accent2);}
  .history-list{flex:1;overflow-y:auto;padding:12px;}
  .history-item{padding:12px;border-radius:8px;margin-bottom:8px;cursor:pointer;transition:background 0.2s;}
  .history-item:hover{background:var(--surface2);}
  .hist-expr{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--muted);}
  .hist-result{font-family:'Share Tech Mono',monospace;font-size:18px;color:var(--text);margin-top:2px;}
  .history-empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px;}
  /* SCIENTIFIC BUTTONS */
  .sci-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);}
  .sci-row .btn{aspect-ratio:unset;padding:12px 4px;font-size:12px;}
</style>
</head>
<body>

<div class="calculator">
  <div class="display">
    <div class="display-expr" id="expr"></div>
    <div class="display-main" id="display">0</div>
  </div>
  <div class="mode-bar">
    <button class="mode-btn active" onclick="setMode('standard',this)">Standard</button>
    <button class="mode-btn" onclick="setMode('scientific',this)">Scientific</button>
  </div>
  <div id="sciRow" class="sci-row" style="display:none">
    <button class="btn btn-sci" onclick="sciOp('sin')">sin</button>
    <button class="btn btn-sci" onclick="sciOp('cos')">cos</button>
    <button class="btn btn-sci" onclick="sciOp('tan')">tan</button>
    <button class="btn btn-sci" onclick="sciOp('log')">log</button>
    <button class="btn btn-sci" onclick="sciOp('sqrt')">√</button>
    <button class="btn btn-sci" onclick="sciOp('sq')">x²</button>
    <button class="btn btn-sci" onclick="sciOp('inv')">1/x</button>
    <button class="btn btn-sci" onclick="insertVal('Math.PI')">π</button>
  </div>
  <div class="buttons">
    <button class="btn btn-clear" onclick="clearAll()">AC</button>
    <button class="btn btn-op" onclick="toggleSign()">+/−</button>
    <button class="btn btn-op" onclick="percent()">%</button>
    <button class="btn btn-op" onclick="inputOp('/')">÷</button>
    <button class="btn btn-num" onclick="inputNum('7')">7</button>
    <button class="btn btn-num" onclick="inputNum('8')">8</button>
    <button class="btn btn-num" onclick="inputNum('9')">9</button>
    <button class="btn btn-op" onclick="inputOp('*')">×</button>
    <button class="btn btn-num" onclick="inputNum('4')">4</button>
    <button class="btn btn-num" onclick="inputNum('5')">5</button>
    <button class="btn btn-num" onclick="inputNum('6')">6</button>
    <button class="btn btn-op" onclick="inputOp('-')">−</button>
    <button class="btn btn-num" onclick="inputNum('1')">1</button>
    <button class="btn btn-num" onclick="inputNum('2')">2</button>
    <button class="btn btn-num" onclick="inputNum('3')">3</button>
    <button class="btn btn-op" onclick="inputOp('+')">+</button>
    <button class="btn btn-num btn-zero" onclick="inputNum('0')">0</button>
    <button class="btn btn-num" onclick="inputDot()">.</button>
    <button class="btn btn-eq" onclick="calculate()">=</button>
  </div>
</div>

<div class="history-panel">
  <div class="history-header">
    <h3>History</h3>
    <button class="clear-hist" onclick="clearHistory()">Clear all</button>
  </div>
  <div class="history-list" id="historyList">
    <div class="history-empty">No calculations yet</div>
  </div>
</div>

<script>
let current = '0';
let expression = '';
let justCalculated = false;
let history = [];

function updateDisplay(val, type='') {
  const el = document.getElementById('display');
  el.textContent = val;
  el.className = 'display-main' + (type ? ' '+type : '');
}

function updateExpr(val) { document.getElementById('expr').textContent = val; }

function inputNum(n) {
  if (justCalculated) { current = n; expression = ''; justCalculated = false; }
  else current = current === '0' ? n : current + n;
  updateDisplay(current);
}

function inputOp(op) {
  justCalculated = false;
  expression = (expression || current) + ' ' + {'+':'+','-':'−','*':'×','/':'÷'}[op] + ' ';
  current = expression.trim().split(' ').pop() !== '' ? '0' : current;
  expression = expression.replace(/ $/, '');
  const raw = expression.replace(/÷/g,'/').replace(/×/g,'*').replace(/−/g,'-');
  expression = raw + ' ' + op + ' ';
  current = '0';
  updateExpr(expression.replace(/\//g,'÷').replace(/\*/g,'×').replace(/-/g,'−'));
  updateDisplay(current);
}

function inputDot() {
  if (!current.includes('.')) current += '.';
  updateDisplay(current);
}

function clearAll() {
  current = '0'; expression = ''; justCalculated = false;
  updateDisplay('0'); updateExpr('');
}

function toggleSign() { current = String(-parseFloat(current)); updateDisplay(current); }

function percent() { current = String(parseFloat(current) / 100); updateDisplay(current); }

function insertVal(v) {
  current = String(eval(v));
  updateDisplay(current);
}

function calculate() {
  try {
    const raw = expression + current;
    const safe = raw.replace(/÷/g,'/').replace(/×/g,'*').replace(/−/g,'-');
    const result = Function('"use strict"; return (' + safe + ')')();
    const resultStr = parseFloat(result.toFixed(10)).toString();
    const histExpr = (raw + ' =').replace(/\//g,'÷').replace(/\*/g,'×');
    addHistory(histExpr, resultStr);
    updateExpr(histExpr);
    updateDisplay(resultStr, 'result');
    current = resultStr;
    expression = '';
    justCalculated = true;
  } catch(e) {
    updateDisplay('Error', 'error');
    setTimeout(() => { updateDisplay('0'); current = '0'; }, 1000);
  }
}

function sciOp(op) {
  const n = parseFloat(current);
  let result;
  switch(op) {
    case 'sin': result = Math.sin(n * Math.PI / 180); break;
    case 'cos': result = Math.cos(n * Math.PI / 180); break;
    case 'tan': result = Math.tan(n * Math.PI / 180); break;
    case 'log': result = Math.log10(n); break;
    case 'sqrt': result = Math.sqrt(n); break;
    case 'sq': result = n * n; break;
    case 'inv': result = 1 / n; break;
  }
  const resultStr = parseFloat(result.toFixed(10)).toString();
  addHistory(`${op}(${n}) =`, resultStr);
  updateExpr(`${op}(${n}) =`);
  updateDisplay(resultStr, 'result');
  current = resultStr;
  justCalculated = true;
}

function addHistory(expr, result) {
  history.unshift({ expr, result });
  if (history.length > 20) history.pop();
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('historyList');
  if (history.length === 0) { list.innerHTML = '<div class="history-empty">No calculations yet</div>'; return; }
  list.innerHTML = history.map((h,i) => `
    <div class="history-item" onclick="useHistory(${i})">
      <div class="hist-expr">${h.expr}</div>
      <div class="hist-result">${h.result}</div>
    </div>
  `).join('');
}

function useHistory(i) {
  current = history[i].result;
  updateDisplay(current, 'result');
  justCalculated = true;
}

function clearHistory() { history = []; renderHistory(); }

function setMode(mode, btn) {
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('sciRow').style.display = mode === 'scientific' ? 'grid' : 'none';
}

// Keyboard support
document.addEventListener('keydown', e => {
  if (e.key >= '0' && e.key <= '9') inputNum(e.key);
  else if (e.key === '.') inputDot();
  else if (e.key === '+') inputOp('+');
  else if (e.key === '-') inputOp('-');
  else if (e.key === '*') inputOp('*');
  else if (e.key === '/') { e.preventDefault(); inputOp('/'); }
  else if (e.key === 'Enter' || e.key === '=') calculate();
  else if (e.key === 'Escape') clearAll();
  else if (e.key === 'Backspace') { current = current.length > 1 ? current.slice(0,-1) : '0'; updateDisplay(current); }
});
</script>
</body>
</html>
