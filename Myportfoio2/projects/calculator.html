<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator Pro</title>
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#1c1c1e;--surface:#2c2c2e;--surface2:#3a3a3c;--border:#48484a;--accent:#ff9f0a;--blue:#0a84ff;--green:#30d158;--red:#ff453a;--text:#ffffff;--muted:#8e8e93;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'SF Pro Display',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;gap:24px;flex-wrap:wrap;padding:24px;}
/* CALC WRAPPER */
.calc-wrapper{display:flex;flex-direction:column;gap:16px;}
.calc{background:#1c1c1e;border-radius:28px;overflow:hidden;width:360px;box-shadow:0 32px 64px rgba(0,0,0,0.8),inset 0 1px 0 rgba(255,255,255,0.08);}
/* MODE TABS */
.mode-tabs{display:flex;background:var(--surface);padding:4px;gap:2px;}
.mode-tab{flex:1;padding:8px;border:none;background:transparent;color:var(--muted);font-family:-apple-system,sans-serif;font-size:13px;font-weight:500;cursor:pointer;border-radius:8px;transition:all 0.2s;}
.mode-tab.active{background:var(--surface2);color:var(--text);}
/* DISPLAY */
.display{background:#000;padding:20px 24px 16px;min-height:140px;display:flex;flex-direction:column;justify-content:flex-end;align-items:flex-end;}
.disp-history{font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--muted);min-height:22px;text-align:right;margin-bottom:4px;word-break:break-all;}
.disp-expr{font-family:'JetBrains Mono',monospace;font-size:15px;color:rgba(255,255,255,0.45);min-height:22px;text-align:right;word-break:break-all;}
.disp-main{font-family:'JetBrains Mono',monospace;font-size:clamp(32px,8vw,52px);font-weight:300;text-align:right;word-break:break-all;line-height:1.1;transition:color 0.3s;}
.disp-main.result{color:var(--green);}
.disp-main.error{color:var(--red);}
/* SCI ROW */
.sci-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);}
.sci-btn{padding:13px 4px;border:none;background:#1c2230;color:#7eb8f7;font-family:'JetBrains Mono',monospace;font-size:12px;cursor:pointer;transition:all 0.12s;text-align:center;}
.sci-btn:hover{background:#233052;}
.sci-btn:active{transform:scale(0.94);background:#1a4a6e;}
/* BUTTONS */
.btns{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);}
.btn{padding:0;aspect-ratio:1;border:none;font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:400;cursor:pointer;transition:all 0.12s;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0);transition:background 0.1s;}
.btn:active::after{background:rgba(255,255,255,0.15);}
.btn:active{transform:scale(0.94);}
.btn-num{background:#333335;color:var(--text);}
.btn-op{background:#505052;color:var(--text);font-size:18px;}
.btn-fn{background:#1c1c1e;color:var(--text);font-size:16px;}
.btn-eq{background:var(--accent);color:#000;font-size:22px;font-weight:600;}
.btn-eq:active{background:#e8920a;}
.btn-zero{grid-column:span 2;aspect-ratio:unset;justify-content:flex-start;padding:0 28px;border-radius:0;}
.btn-clear{background:#1c1c1e;color:var(--red);}
/* HISTORY PANEL */
.hist-panel{background:#1c1c1e;border-radius:20px;overflow:hidden;width:280px;height:560px;display:flex;flex-direction:column;box-shadow:0 32px 64px rgba(0,0,0,0.6);}
.hist-top{padding:20px 20px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.hist-top h3{font-size:16px;font-weight:600;}
.hist-clr{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;font-family:-apple-system,sans-serif;}
.hist-clr:hover{color:var(--red);}
.hist-list{flex:1;overflow-y:auto;padding:8px 12px;}
.hist-list::-webkit-scrollbar{width:4px;}
.hist-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.hist-item{padding:12px;border-radius:10px;margin-bottom:6px;cursor:pointer;transition:background 0.2s;}
.hist-item:hover{background:var(--surface);}
.hist-expr{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);}
.hist-result{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:500;color:var(--text);margin-top:2px;}
.hist-empty{text-align:center;padding:48px 20px;color:var(--muted);font-size:13px;}
.hist-empty div{font-size:36px;margin-bottom:10px;}
/* MEM ROW */
.mem-row{display:flex;gap:1px;background:var(--border);}
.mem-btn{flex:1;padding:8px 4px;border:none;background:var(--surface);color:var(--blue);font-family:'JetBrains Mono',monospace;font-size:11px;cursor:pointer;transition:background 0.2s;text-align:center;}
.mem-btn:hover{background:var(--surface2);}
.mem-btn:active{transform:scale(0.95);}
</style>
</head>
<body>
<div class="calc-wrapper">
  <div class="calc">
    <div class="mode-tabs">
      <button class="mode-tab active" onclick="setMode('standard',this)">Standard</button>
      <button class="mode-tab" onclick="setMode('scientific',this)">Scientific</button>
    </div>
    <div class="display">
      <div class="disp-history" id="dispHistory"></div>
      <div class="disp-expr" id="dispExpr"></div>
      <div class="disp-main" id="dispMain">0</div>
    </div>
    <div class="sci-row" id="sciRow" style="display:none">
      <button class="sci-btn" onclick="sc('sin')">sin</button>
      <button class="sci-btn" onclick="sc('cos')">cos</button>
      <button class="sci-btn" onclick="sc('tan')">tan</button>
      <button class="sci-btn" onclick="sc('log')">log₁₀</button>
      <button class="sci-btn" onclick="sc('sqrt')">√x</button>
      <button class="sci-btn" onclick="sc('sq')">x²</button>
      <button class="sci-btn" onclick="sc('cube')">x³</button>
      <button class="sci-btn" onclick="sc('ln')">ln</button>
      <button class="sci-btn" onclick="sc('inv')">1/x</button>
      <button class="sci-btn" onclick="sc('abs')">|x|</button>
      <button class="sci-btn" onclick="sc('floor')">⌊x⌋</button>
      <button class="sci-btn" onclick="sc('ceil')">⌈x⌉</button>
      <button class="sci-btn" onclick="insPi()">π</button>
      <button class="sci-btn" onclick="insE()">e</button>
      <button class="sci-btn" onclick="sc('fact')">n!</button>
      <button class="sci-btn" onclick="insBrackets()">( )</button>
    </div>
    <div class="mem-row">
      <button class="mem-btn" onclick="mc()">MC</button>
      <button class="mem-btn" onclick="mr()">MR</button>
      <button class="mem-btn" onclick="mplus()">M+</button>
      <button class="mem-btn" onclick="mminus()">M−</button>
      <button class="mem-btn" id="msBtn" onclick="ms()">MS</button>
    </div>
    <div class="btns">
      <button class="btn btn-clear" onclick="clearAll()">AC</button>
      <button class="btn btn-fn" onclick="toggleSign()">⁺∕₋</button>
      <button class="btn btn-fn" onclick="pct()">%</button>
      <button class="btn btn-op" onclick="op('/')">÷</button>
      <button class="btn btn-num" onclick="num('7')">7</button>
      <button class="btn btn-num" onclick="num('8')">8</button>
      <button class="btn btn-num" onclick="num('9')">9</button>
      <button class="btn btn-op" onclick="op('*')">×</button>
      <button class="btn btn-num" onclick="num('4')">4</button>
      <button class="btn btn-num" onclick="num('5')">5</button>
      <button class="btn btn-num" onclick="num('6')">6</button>
      <button class="btn btn-op" onclick="op('-')">−</button>
      <button class="btn btn-num" onclick="num('1')">1</button>
      <button class="btn btn-num" onclick="num('2')">2</button>
      <button class="btn btn-num" onclick="num('3')">3</button>
      <button class="btn btn-op" onclick="op('+')">+</button>
      <button class="btn btn-num btn-zero" onclick="num('0')">0</button>
      <button class="btn btn-num" onclick="dot()">.</button>
      <button class="btn btn-eq" onclick="eq()">=</button>
    </div>
  </div>
</div>

<div class="hist-panel">
  <div class="hist-top">
    <h3>History</h3>
    <button class="hist-clr" onclick="clearHist()">Clear</button>
  </div>
  <div class="hist-list" id="histList"><div class="hist-empty"><div>🔢</div>No calculations yet</div></div>
</div>

<script>
let cur='0',expr='',justCalc=false,mem=0,hist=[],bracketOpen=0;
const display=document.getElementById('dispMain');
const exprEl=document.getElementById('dispExpr');
const histEl=document.getElementById('dispHistory');
function show(v,type=''){display.textContent=v;display.className='disp-main'+(type?' '+type:'');}
function showExpr(v){exprEl.textContent=v;}
function fmtDisplay(v){
  const n=parseFloat(v);
  if(isNaN(n))return v;
  if(Math.abs(n)>=1e15||Math.abs(n)<1e-10&&n!==0)return n.toExponential(4);
  const s=parseFloat(n.toPrecision(12)).toString();
  if(s.includes('.'))return s.replace(/\.?0+$/,'');
  return s;
}
function num(n){
  if(justCalc){cur=n;expr='';justCalc=false;}
  else cur=cur==='0'?n:cur+n;
  show(fmtDisplay(cur));
}
function dot(){
  if(justCalc){cur='0.';justCalc=false;}
  else if(!cur.includes('.'))cur+='.';
  show(cur);
}
function op(o){
  justCalc=false;
  if(expr&&expr.slice(-3).trim().match(/[+\-*/]/))expr=expr.slice(0,-3)+' '+o+' ';
  else expr=(expr||cur)+' '+o+' ';
  cur='0';
  showExpr(expr.replace(/\//g,'÷').replace(/\*/g,'×').replace(/-/g,'−'));
  show(cur);
}
function clearAll(){cur='0';expr='';justCalc=false;bracketOpen=0;show('0');showExpr('');histEl.textContent='';}
function toggleSign(){cur=String(-parseFloat(cur));show(fmtDisplay(cur));}
function pct(){cur=String(parseFloat(cur)/100);show(fmtDisplay(cur));}
function insPi(){cur=String(Math.PI);show(fmtDisplay(cur));}
function insE(){cur=String(Math.E);show(fmtDisplay(cur));}
function insBrackets(){
  if(bracketOpen===0){cur+='(';bracketOpen++;}
  else{cur+=')';bracketOpen--;}
  show(cur);
}
function sc(fn){
  const n=parseFloat(cur);
  let r;
  switch(fn){
    case'sin':r=Math.sin(n*Math.PI/180);histEl.textContent=`sin(${n}°)`;break;
    case'cos':r=Math.cos(n*Math.PI/180);histEl.textContent=`cos(${n}°)`;break;
    case'tan':r=Math.tan(n*Math.PI/180);histEl.textContent=`tan(${n}°)`;break;
    case'log':r=Math.log10(n);histEl.textContent=`log(${n})`;break;
    case'ln':r=Math.log(n);histEl.textContent=`ln(${n})`;break;
    case'sqrt':r=Math.sqrt(n);histEl.textContent=`√${n}`;break;
    case'sq':r=n*n;histEl.textContent=`${n}²`;break;
    case'cube':r=n*n*n;histEl.textContent=`${n}³`;break;
    case'inv':r=1/n;histEl.textContent=`1/${n}`;break;
    case'abs':r=Math.abs(n);histEl.textContent=`|${n}|`;break;
    case'floor':r=Math.floor(n);histEl.textContent=`⌊${n}⌋`;break;
    case'ceil':r=Math.ceil(n);histEl.textContent=`⌈${n}⌉`;break;
    case'fact':r=factorial(n);histEl.textContent=`${n}!`;break;
  }
  const rs=fmtDisplay(r);
  addHist(histEl.textContent+' = '+rs,rs);
  cur=String(parseFloat(r.toFixed(12)));
  show(rs,'result');justCalc=true;
}
function factorial(n){if(n<0||!Number.isInteger(n))return NaN;if(n===0||n===1)return 1;let r=1;for(let i=2;i<=n;i++)r*=i;return r;}
function eq(){
  try{
    const raw=expr+cur;
    const safe=raw.replace(/÷/g,'/').replace(/×/g,'*').replace(/−/g,'-');
    const result=Function('"use strict";return('+safe+')')();
    const rs=fmtDisplay(result);
    const exprStr=raw.replace(/\//g,'÷').replace(/\*/g,'×');
    addHist(exprStr+' =',rs);
    histEl.textContent=exprStr+' =';
    showExpr('');
    show(rs,'result');
    cur=String(result);expr='';justCalc=true;
  }catch(e){show('Error','error');setTimeout(()=>{show('0');cur='0';expr='';},1000);}
}
function addHist(expression,result){
  hist.unshift({expression,result});
  if(hist.length>50)hist.pop();
  renderHist();
}
function renderHist(){
  const el=document.getElementById('histList');
  if(!hist.length){el.innerHTML='<div class="hist-empty"><div>🔢</div>No calculations yet</div>';return;}
  el.innerHTML=hist.map((h,i)=>`<div class="hist-item" onclick="useHist(${i})"><div class="hist-expr">${h.expression}</div><div class="hist-result">${h.result}</div></div>`).join('');
}
function useHist(i){cur=hist[i].result;show(fmtDisplay(cur),'result');justCalc=true;}
function clearHist(){hist=[];renderHist();}
// Memory
function mc(){mem=0;}
function mr(){cur=String(mem);show(fmtDisplay(cur));}
function mplus(){mem+=parseFloat(cur);}
function mminus(){mem-=parseFloat(cur);}
function ms(){mem=parseFloat(cur);const b=document.getElementById('msBtn');b.style.color='var(--green)';setTimeout(()=>b.style.color='',1000);}
// Mode
function setMode(mode,btn){
  document.querySelectorAll('.mode-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('sciRow').style.display=mode==='scientific'?'grid':'none';
}
// Keyboard
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  const k=e.key;
  if(k>='0'&&k<='9')num(k);
  else if(k==='.')dot();
  else if(k==='+'||k==='-'||k==='*')op(k);
  else if(k==='/'){{e.preventDefault();op('/');}}
  else if(k==='Enter'||k==='=')eq();
  else if(k==='Escape')clearAll();
  else if(k==='Backspace'){
    if(cur.length>1)cur=cur.slice(0,-1);
    else cur='0';
    show(cur);
  }
  else if(k==='%')pct();
});
</script>
</body>
</html>
