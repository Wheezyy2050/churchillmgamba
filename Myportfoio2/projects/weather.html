<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skycast — Weather</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;min-height:100vh;transition:background 1.2s ease;color:#fff;}
body.sunny{background:linear-gradient(160deg,#1565c0 0%,#1976d2 40%,#42a5f5 100%);}
body.cloudy{background:linear-gradient(160deg,#455a64 0%,#546e7a 40%,#78909c 100%);}
body.rainy{background:linear-gradient(160deg,#1a237e 0%,#283593 40%,#3949ab 100%);}
body.stormy{background:linear-gradient(160deg,#1b1b1b 0%,#263238 40%,#37474f 100%);}
body.snowy{background:linear-gradient(160deg,#7986cb 0%,#9fa8da 40%,#c5cae9 100%);}
body.night{background:linear-gradient(160deg,#0a0e1a 0%,#0d1b2a 40%,#1a2332 100%);}
.app{max-width:1100px;margin:0 auto;padding:28px;}
/* SEARCH */
.search-row{display:flex;gap:12px;margin-bottom:32px;}
.search-input{flex:1;background:rgba(255,255,255,0.12);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.2);color:#fff;padding:14px 20px;border-radius:50px;font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:all 0.3s;}
.search-input::placeholder{color:rgba(255,255,255,0.5);}
.search-input:focus{background:rgba(255,255,255,0.18);border-color:rgba(255,255,255,0.4);}
.search-btn{background:rgba(255,255,255,0.15);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.2);color:#fff;padding:14px 24px;border-radius:50px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;}
.search-btn:hover{background:rgba(255,255,255,0.25);}
/* CITY CHIPS */
.cities{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px;}
.city-chip{padding:7px 16px;border-radius:20px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);font-size:13px;cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif;color:#fff;}
.city-chip:hover,.city-chip.active{background:rgba(255,255,255,0.25);border-color:rgba(255,255,255,0.4);}
/* MAIN LAYOUT */
.weather-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:20px;margin-bottom:20px;}
/* MAIN CARD */
.main-card{background:rgba(255,255,255,0.12);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.15);border-radius:24px;padding:36px;position:relative;overflow:hidden;}
.main-card::before{content:'';position:absolute;top:-40px;right:-40px;width:200px;height:200px;background:rgba(255,255,255,0.05);border-radius:50%;}
.city-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.city-name{font-size:28px;font-weight:700;letter-spacing:-0.5px;}
.city-country{font-size:14px;opacity:0.6;margin-top:2px;}
.live-time{text-align:right;}
.live-time-str{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;}
.live-date-str{font-size:12px;opacity:0.55;margin-top:2px;}
.weather-main{display:flex;align-items:center;gap:20px;margin:24px 0;}
.weather-icon-big{font-size:88px;line-height:1;filter:drop-shadow(0 8px 16px rgba(0,0,0,0.2));}
.temp-block{}
.temp-big{font-size:80px;font-weight:800;line-height:1;letter-spacing:-3px;}
.temp-unit{font-size:36px;font-weight:400;vertical-align:top;margin-top:12px;}
.weather-desc-main{font-size:20px;font-weight:500;opacity:0.85;margin-top:4px;text-transform:capitalize;}
.weather-sub{font-size:14px;opacity:0.55;}
.feels-range{display:flex;gap:24px;margin-top:20px;padding-top:20px;border-top:1px solid rgba(255,255,255,0.12);}
.fr-item{font-size:13px;opacity:0.7;}
.fr-val{font-size:16px;font-weight:600;opacity:1;}
/* UNIT TOGGLE */
.unit-toggle{position:absolute;top:20px;left:20px;display:flex;background:rgba(0,0,0,0.2);border-radius:20px;padding:3px;}
.ub{padding:5px 12px;border:none;background:transparent;color:rgba(255,255,255,0.6);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;border-radius:16px;transition:all 0.2s;}
.ub.active{background:rgba(255,255,255,0.2);color:#fff;}
/* SIDE CARDS */
.side-cards{display:flex;flex-direction:column;gap:16px;}
.side-card{background:rgba(255,255,255,0.1);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.12);border-radius:16px;padding:20px;}
.side-card-title{font-size:11px;letter-spacing:0.15em;text-transform:uppercase;opacity:0.5;margin-bottom:14px;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.stat-item{background:rgba(255,255,255,0.07);border-radius:10px;padding:12px;}
.stat-icon{font-size:18px;margin-bottom:6px;}
.stat-label{font-size:10px;opacity:0.5;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:2px;}
.stat-value{font-size:18px;font-weight:700;}
.stat-unit{font-size:11px;opacity:0.6;}
/* UV BAR */
.uv-bar{height:8px;border-radius:4px;background:linear-gradient(90deg,#43a047,#fdd835,#f57c00,#e53935);margin:8px 0;position:relative;}
.uv-marker{position:absolute;top:-3px;width:14px;height:14px;background:#fff;border-radius:50%;border:2px solid rgba(0,0,0,0.2);transform:translateX(-50%);transition:left 0.5s;}
/* FORECAST */
.forecast-card{background:rgba(255,255,255,0.1);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:24px;}
.fc-title{font-size:11px;letter-spacing:0.15em;text-transform:uppercase;opacity:0.5;margin-bottom:16px;}
.fc-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.07);}
.fc-row:last-child{border-bottom:none;}
.fc-day{font-size:14px;font-weight:600;width:55px;}
.fc-icon{font-size:22px;width:36px;}
.fc-desc{font-size:12px;opacity:0.55;flex:1;}
.fc-rain{font-size:12px;opacity:0.55;margin-right:20px;}
.fc-temps{font-size:14px;font-weight:600;text-align:right;min-width:60px;}
.fc-lo{opacity:0.5;}
/* HOURLY */
.hourly-card{background:rgba(255,255,255,0.1);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:24px;margin-bottom:20px;}
.hourly-scroll{display:flex;gap:12px;overflow-x:auto;padding-bottom:4px;}
.hourly-scroll::-webkit-scrollbar{height:4px;}
.hourly-scroll::-webkit-scrollbar-track{background:rgba(255,255,255,0.05);}
.hourly-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.2);border-radius:2px;}
.hour-item{background:rgba(255,255,255,0.08);border-radius:12px;padding:12px 16px;text-align:center;flex-shrink:0;min-width:70px;transition:background 0.2s;}
.hour-item.now{background:rgba(255,255,255,0.22);border:1px solid rgba(255,255,255,0.3);}
.hour-time{font-size:11px;opacity:0.6;margin-bottom:6px;}
.hour-icon{font-size:20px;margin-bottom:6px;}
.hour-temp{font-size:15px;font-weight:700;}
.not-found{text-align:center;padding:60px;opacity:0.5;}
.not-found div{font-size:48px;margin-bottom:12px;}
@media(max-width:768px){.weather-grid{grid-template-columns:1fr;}.app{padding:16px;}}
</style>
</head>
<body class="sunny">
<div class="app">
  <div class="search-row">
    <input class="search-input" type="text" id="searchInput" placeholder="🔍 Search for a city..." onkeydown="if(event.key==='Enter')doSearch()">
    <button class="search-btn" onclick="doSearch()">Search</button>
  </div>
  <div class="cities" id="cityChips"></div>
  <div id="weatherApp"></div>
</div>
<script>
const CITIES=['Johannesburg','Cape Town','Durban','London','New York','Tokyo','Dubai','Paris','Sydney','Lagos'];
const WEATHER={
  'Johannesburg':{temp:23,feels:21,hi:27,lo:14,desc:'Partly Cloudy',icon:'⛅',humidity:52,wind:18,uv:6,vis:12,pressure:1013,sunrise:'05:48',sunset:'18:22',type:'cloudy',country:'South Africa 🇿🇦',forecast:[{d:'Mon',i:'☀️',desc:'Sunny',hi:28,lo:15,r:0},{d:'Tue',i:'⛅',desc:'Partly Cloudy',hi:24,lo:13,r:10},{d:'Wed',i:'🌧️',desc:'Showers',hi:18,lo:10,r:70},{d:'Thu',i:'⛅',desc:'Cloudy',hi:22,lo:12,r:20},{d:'Fri',i:'☀️',desc:'Sunny',hi:27,lo:14,r:0},{d:'Sat',i:'🌤️',desc:'Mostly Clear',hi:26,lo:13,r:5}],hourly:[{t:'Now',i:'⛅',temp:23},{t:'14:00',i:'⛅',temp:25},{t:'15:00',i:'🌤️',temp:26},{t:'16:00',i:'🌤️',temp:26},{t:'17:00',i:'⛅',temp:24},{t:'18:00',i:'🌆',temp:22},{t:'19:00',i:'🌙',temp:20},{t:'20:00',i:'🌙',temp:18},{t:'21:00',i:'🌙',temp:17}]},

let currentCity='Johannesburg',unit='C';
function conv(t){return unit==='C'?t:Math.round(t*9/5+32);}
function u(){return unit==='C'?'°C':'°F';}
function render(){

  const now=new Date();
  const timeStr=now.toLocaleTimeString('en-ZA',{hour:'2-digit',minute:'2-digit',second:'2-digit'});

          <div class="fr-item">↓ Low<div class="fr-val">${conv(d.lo)}${u()}</div></div>

    </div>
    <div class="forecast-card">

      ${d.forecast.map(f=>`
        <div class="fc-row">
          <div class="fc-day">${f.d}</div>

          <div class="fc-rain">💧 ${f.r}%</div>
          <div class="fc-temps"><span>${conv(f.hi)}°</span> / <span class="fc-lo">${conv(f.lo)}°</span></div>
        </div>`).join('')}
    </div>`;
}
function doSearch(){
  const q=document.getElementById('searchInput').value.trim();
  const match=Object.keys(WEATHER).find(c=>c.toLowerCase().includes(q.toLowerCase()));
  if(match){currentCity=match;document.getElementById('searchInput').value='';renderChips();render();}
  else{document.getElementById('weatherApp').innerHTML=`<div class="not-found"><div>❌</div><p>City not found. Try: ${Object.keys(WEATHER).join(', ')}</p></div>`;}
}
function setUnit(u){unit=u;render();}
function loadCity(city){currentCity=city;renderChips();render();}
function renderChips(){
  document.getElementById('cityChips').innerHTML=CITIES.map(c=>`<div class="city-chip${c===currentCity?' active':''}" onclick="loadCity('${c}')">${c}</div>`).join('');
}
// Live clock
setInterval(()=>{
  const now=new Date();
  const el=document.getElementById('liveTime');
  if(el)el.textContent=now.toLocaleTimeString('en-ZA',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
},1000);
renderChips();render();
</script>
</body>
</html>
