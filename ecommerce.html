<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVA — Premium Store</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Karla:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#fafaf8;--dark:#0d0d0d;--accent:#c9a96e;--surface:#fff;--border:#e8e4dd;--muted:#9a9489;--red:#e05c5c;}
body{background:var(--bg);color:var(--dark);font-family:'Karla',sans-serif;min-height:100vh;}
.nav{position:sticky;top:0;z-index:200;background:rgba(250,250,248,0.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 48px;display:flex;align-items:center;justify-content:space-between;height:72px;}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;letter-spacing:4px;text-transform:uppercase;}
.nav-center{display:flex;gap:40px;}
.nav-center a{text-decoration:none;color:var(--muted);font-size:12px;letter-spacing:0.15em;text-transform:uppercase;transition:color 0.2s;}
.nav-center a:hover{color:var(--dark);}
.nav-right{display:flex;align-items:center;gap:16px;}
.search-wrap{position:relative;}
.nav-search{background:var(--bg);border:1px solid var(--border);padding:9px 38px 9px 14px;font-family:'Karla',sans-serif;font-size:13px;width:200px;outline:none;transition:all 0.3s;}
.nav-search:focus{border-color:var(--accent);width:260px;}
.search-icon{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}
.cart-btn{position:relative;background:var(--dark);color:#fff;border:none;padding:10px 22px;font-family:'Karla',sans-serif;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background 0.2s;}
.cart-btn:hover{background:var(--accent);}
.cart-badge{background:var(--accent);color:#fff;width:18px;height:18px;border-radius:50%;font-size:10px;display:flex;align-items:center;justify-content:center;font-weight:700;}
.hero{background:var(--dark);color:#fff;display:grid;grid-template-columns:1fr 1fr;min-height:480px;overflow:hidden;}
.hero-content{padding:80px 60px;display:flex;flex-direction:column;justify-content:center;}
.hero-eyebrow{font-size:11px;letter-spacing:0.3em;text-transform:uppercase;color:var(--accent);margin-bottom:20px;}
.hero-h1{font-family:'Cormorant Garamond',serif;font-size:clamp(38px,5vw,66px);font-weight:600;line-height:1.05;margin-bottom:18px;}
.hero-h1 em{font-style:italic;color:var(--accent);}
.hero-p{color:#999;font-size:15px;line-height:1.7;margin-bottom:36px;max-width:360px;}
.hero-btns{display:flex;gap:14px;}
.btn-primary{background:var(--accent);color:#fff;border:none;padding:14px 32px;font-family:'Karla',sans-serif;font-size:12px;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;transition:all 0.25s;}
.btn-primary:hover{background:#b8904f;transform:translateY(-2px);}
.btn-ghost{background:transparent;color:#fff;border:1px solid rgba(255,255,255,0.25);padding:14px 28px;font-family:'Karla',sans-serif;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:border-color 0.2s;}
.btn-ghost:hover{border-color:#fff;}
.hero-img{overflow:hidden;position:relative;}
.hero-img img{width:100%;height:100%;object-fit:cover;opacity:0.85;transition:transform 8s ease;}
.hero-img:hover img{transform:scale(1.05);}
.trust{background:var(--dark);color:#fff;display:flex;border-top:1px solid #1e1e1e;}
.trust-item{flex:1;padding:16px 24px;display:flex;align-items:center;gap:12px;border-right:1px solid #1e1e1e;font-size:12px;letter-spacing:0.04em;}
.trust-item:last-child{border-right:none;}
.shop-top{padding:48px 48px 0;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
.shop-heading{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:600;}
.sort-select{background:#fff;border:1px solid var(--border);padding:9px 16px;font-family:'Karla',sans-serif;font-size:13px;outline:none;cursor:pointer;}
.filters{padding:20px 48px;display:flex;gap:8px;flex-wrap:wrap;border-bottom:1px solid var(--border);}
.chip{padding:7px 18px;border:1px solid var(--border);background:transparent;font-family:'Karla',sans-serif;font-size:12px;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transition:all 0.2s;}
.chip.active,.chip:hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.count-row{padding:12px 48px;font-size:13px;color:var(--muted);border-bottom:1px solid var(--border);}
.grid{padding:32px 48px 80px;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:28px;}
.card{cursor:pointer;transition:transform 0.3s;position:relative;}
.card:hover{transform:translateY(-5px);}
.card:hover .card-actions{opacity:1;transform:translateY(0);}
.card:hover .wl-btn{opacity:1;}
.img-wrap{position:relative;overflow:hidden;aspect-ratio:3/4;background:#f0ede8;}
.img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform 0.6s;}
.card:hover .img-wrap img{transform:scale(1.05);}
.img-fallback{width:100%;height:100%;display:none;align-items:center;justify-content:center;font-size:72px;background:#f0ede8;position:absolute;inset:0;}
.badge{position:absolute;top:12px;left:12px;padding:4px 10px;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;font-weight:600;}
.badge-sale{background:var(--red);color:#fff;}
.badge-new{background:var(--dark);color:#fff;}
.badge-hot{background:var(--accent);color:#fff;}
.wl-btn{position:absolute;top:12px;right:12px;width:32px;height:32px;background:#fff;border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:all 0.2s;opacity:0;}
.wl-btn.liked{opacity:1;}
.card-actions{position:absolute;bottom:0;left:0;right:0;padding:10px;opacity:0;transform:translateY(8px);transition:all 0.3s;}
.atc-btn{width:100%;padding:11px;background:rgba(13,13,13,0.92);backdrop-filter:blur(4px);color:#fff;border:none;font-family:'Karla',sans-serif;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:background 0.2s;}
.atc-btn:hover,.atc-btn.added{background:var(--accent);}
.card-info{padding:14px 0;}
.card-brand{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-bottom:3px;}
.card-name{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;margin-bottom:6px;line-height:1.3;}
.card-rating{display:flex;align-items:center;gap:6px;margin-bottom:7px;}
.stars{color:var(--accent);font-size:11px;letter-spacing:1px;}
.rev{font-size:11px;color:var(--muted);}
.price-row{display:flex;align-items:center;gap:10px;}
.price-now{font-size:16px;font-weight:600;}
.price-was{font-size:13px;color:var(--muted);text-decoration:line-through;}
.price-pct{font-size:11px;color:var(--red);font-weight:600;}
/* CART */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:300;opacity:0;pointer-events:none;transition:opacity 0.3s;}
.overlay.open{opacity:1;pointer-events:all;}
.drawer{position:fixed;right:0;top:0;bottom:0;width:420px;background:#fff;z-index:301;transform:translateX(110%);transition:transform 0.4s cubic-bezier(0.16,1,0.3,1);display:flex;flex-direction:column;}
.drawer.open{transform:translateX(0);}
.dh{padding:28px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.dh-title{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;}
.dh-close{background:none;border:none;font-size:24px;cursor:pointer;color:var(--muted);line-height:1;padding:0;}
.db{flex:1;overflow-y:auto;padding:20px 28px;}
.empty-cart{text-align:center;padding:60px 20px;}
.empty-cart-icon{font-size:52px;margin-bottom:16px;}
.ci{display:flex;gap:14px;padding:16px 0;border-bottom:1px solid var(--border);}
.ci-img{width:70px;height:92px;object-fit:cover;flex-shrink:0;background:#f0ede8;}
.ci-info{flex:1;}
.ci-brand{font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);}
.ci-name{font-family:'Cormorant Garamond',serif;font-size:16px;margin:3px 0 6px;}
.ci-price{font-size:14px;font-weight:600;margin-bottom:10px;}
.qty-wrap{display:flex;align-items:center;}
.qb{width:28px;height:28px;border:1px solid var(--border);background:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.qb:hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.qv{width:36px;height:28px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;}
.rm{background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;margin-left:auto;align-self:flex-start;line-height:1;padding:0;}
.df{padding:20px 28px;border-top:1px solid var(--border);}
.df-row{display:flex;justify-content:space-between;margin-bottom:8px;font-size:13px;}
.df-total{display:flex;justify-content:space-between;margin-bottom:20px;font-size:19px;font-family:'Cormorant Garamond',serif;font-weight:600;}
.co-btn{width:100%;padding:15px;background:var(--dark);color:#fff;border:none;font-family:'Karla',sans-serif;font-size:13px;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;transition:background 0.2s;margin-bottom:10px;}
.co-btn:hover{background:var(--accent);}
.cs-btn{width:100%;padding:11px;background:transparent;color:var(--dark);border:1px solid var(--border);font-family:'Karla',sans-serif;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;}
.toast{position:fixed;bottom:28px;right:28px;background:var(--dark);color:#fff;padding:13px 22px;font-size:13px;opacity:0;transform:translateY(16px);transition:all 0.3s;z-index:500;}
.toast.show{opacity:1;transform:translateY(0);}
@media(max-width:800px){.nav{padding:0 20px;}.nav-center{display:none;}.hero{grid-template-columns:1fr;}.hero-img{min-height:240px;order:-1;}.grid{padding:20px 16px 60px;grid-template-columns:repeat(2,1fr);gap:16px;}.shop-top,.filters,.count-row{padding-left:16px;padding-right:16px;}.drawer{width:100%;}.trust{flex-wrap:wrap;}.trust-item{min-width:50%;}}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-logo">Nova</div>
  <div class="nav-center">
    <a href="#">New In</a><a href="#">Women</a><a href="#">Men</a><a href="#">Sale</a>
  </div>
  <div class="nav-right">
    <div class="search-wrap">
      <input class="nav-search" type="text" placeholder="Search..." id="searchInput" oninput="doSearch(this.value)">
      <span class="search-icon">🔍</span>
    </div>
    <button class="cart-btn" onclick="toggleCart()">🛒 Cart <span class="cart-badge" id="cartBadge">0</span></button>
  </div>
</nav>
<div class="hero">
  <div class="hero-content">
    <div class="hero-eyebrow">New Season 2024</div>
    <h1 class="hero-h1">Dress for the<br><em>life you want</em></h1>
    <p class="hero-p">Curated premium fashion, tech and lifestyle products. Quality crafted for the modern individual.</p>
    <div class="hero-btns">
      <button class="btn-primary" onclick="document.querySelector('.grid').scrollIntoView({behavior:'smooth'})">Shop Now</button>
      <button class="btn-ghost">Lookbook</button>
    </div>
  </div>
  <div class="hero-img">
    <img src="https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=800&q=80" alt="Hero">
  </div>
</div>
<div class="trust">
  <div class="trust-item">🚚 Free Delivery over R500</div>
  <div class="trust-item">↩️ 30 Day Returns</div>
  <div class="trust-item">🔒 Secure Checkout</div>
  <div class="trust-item">💬 24/7 Support</div>
</div>
<div class="shop-top">
  <h2 class="shop-heading">All Products</h2>
  <select class="sort-select" onchange="doSort(this.value)">
    <option value="">Sort: Featured</option>
    <option value="pl">Price: Low → High</option>
    <option value="ph">Price: High → Low</option>
    <option value="r">Top Rated</option>
  </select>
</div>
<div class="filters">
  <button class="chip active" onclick="doCat('all',this)">All</button>
  <button class="chip" onclick="doCat('fashion',this)">Fashion</button>
  <button class="chip" onclick="doCat('tech',this)">Tech</button>
  <button class="chip" onclick="doCat('beauty',this)">Beauty</button>
  <button class="chip" onclick="doCat('home',this)">Home</button>
  <button class="chip" onclick="doCat('sport',this)">Sport</button>
</div>
<div class="count-row" id="countRow"></div>
<div class="grid" id="grid"></div>
<div class="overlay" id="overlay" onclick="toggleCart()"></div>
<div class="drawer" id="drawer">
  <div class="dh"><div class="dh-title">Shopping Cart</div><button class="dh-close" onclick="toggleCart()">×</button></div>
  <div class="db" id="db"></div>
  <div class="df" id="df"></div>
</div>
<div class="toast" id="toast"></div>
<script>
const P=[
  {id:1,name:'Oversized Linen Blazer',brand:'Studio Noir',cat:'fashion',price:1299,was:1899,rating:4.8,rev:124,badge:'sale',img:'https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=500&q=80',e:'🧥'},
  {id:2,name:'Leather Chunky Sneakers',brand:'Atelier M',cat:'fashion',price:2499,was:null,rating:4.9,rev:89,badge:'new',img:'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500&q=80',e:'👟'},
  {id:3,name:'Silk Wrap Midi Dress',brand:'Maison V',cat:'fashion',price:1799,was:2400,rating:4.7,rev:203,badge:'sale',img:'https://images.unsplash.com/photo-1595777457583-95e059d581b8?w=500&q=80',e:'👗'},
  {id:4,name:'Pro Noise-Cancelling Headphones',brand:'SoundLux',cat:'tech',price:3499,was:4999,rating:4.9,rev:567,badge:'hot',img:'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500&q=80',e:'🎧'},
  {id:5,name:'Smartwatch Series 5',brand:'TechWear',cat:'tech',price:5999,was:null,rating:4.8,rev:312,badge:'new',img:'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500&q=80',e:'⌚'},
  {id:6,name:'Vitamin C Brightening Serum',brand:'Lumière',cat:'beauty',price:599,was:799,rating:4.6,rev:891,badge:'sale',img:'https://images.unsplash.com/photo-1620916566398-39f1143ab7be?w=500&q=80',e:'✨'},
  {id:7,name:'Oud Silk Eau de Parfum',brand:'Maison Noir',cat:'beauty',price:2200,was:null,rating:4.9,rev:145,badge:'new',img:'https://images.unsplash.com/photo-1541643600914-78b084683702?w=500&q=80',e:'🌸'},
  {id:8,name:'Merino Wool Throw',brand:'Casa Lux',cat:'home',price:899,was:1199,rating:4.7,rev:234,badge:'sale',img:'https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=500&q=80',e:'🛋️'},
  {id:9,name:'Ceramic Mug Set of 4',brand:'Studio Clay',cat:'home',price:549,was:null,rating:4.8,rev:178,badge:null,img:'https://images.unsplash.com/photo-1514228742587-6b1558fcca3d?w=500&q=80',e:'☕'},
  {id:10,name:'Performance Running Shoes',brand:'AeroRun',cat:'sport',price:1899,was:2499,rating:4.8,rev:445,badge:'sale',img:'https://images.unsplash.com/photo-1460353581641-37baddab0fa2?w=500&q=80',e:'👟'},
  {id:11,name:'Premium Cork Yoga Mat',brand:'ZenFlow',cat:'sport',price:799,was:null,rating:4.7,rev:289,badge:'new',img:'https://images.unsplash.com/photo-1601925260368-ae2f83cf8b7f?w=500&q=80',e:'🧘'},
  {id:12,name:'15W Wireless Charging Pad',brand:'ChargePro',cat:'tech',price:449,was:699,rating:4.5,rev:623,badge:'sale',img:'https://images.unsplash.com/photo-1588872657578-7efd1f1555ed?w=500&q=80',e:'⚡'},
];
let cart=[],wl=new Set(),cat='all',sort='',q='',view=[...P];
function render(){
  view=[...P].filter(p=>(cat==='all'||p.cat===cat)&&(!q||p.name.toLowerCase().includes(q)||p.brand.toLowerCase().includes(q)));
  if(sort==='pl')view.sort((a,b)=>a.price-b.price);
  else if(sort==='ph')view.sort((a,b)=>b.price-a.price);
  else if(sort==='r')view.sort((a,b)=>b.rating-a.rating);
  document.getElementById('countRow').textContent=`Showing ${view.length} products`;
  document.getElementById('grid').innerHTML=view.length?view.map(p=>`
    <div class="card">
      <div class="img-wrap">
        <img src="${p.img}" alt="${p.name}" loading="lazy" onerror="this.style.display='none';this.nextSibling.style.display='flex'">
        <div class="img-fallback">${p.e}</div>
        ${p.badge?`<div class="badge badge-${p.badge}">${p.badge}</div>`:''}
        <button class="wl-btn${wl.has(p.id)?' liked':''}" onclick="toggleWL(event,${p.id})">${wl.has(p.id)?'❤️':'🤍'}</button>
        <div class="card-actions"><button class="atc-btn" id="b${p.id}" onclick="addCart(event,${p.id})">Add to Cart</button></div>
      </div>
      <div class="card-info">
        <div class="card-brand">${p.brand}</div>
        <div class="card-name">${p.name}</div>
        <div class="card-rating"><span class="stars">${'★'.repeat(Math.floor(p.rating))}${'☆'.repeat(5-Math.floor(p.rating))}</span><span class="rev">${p.rating} (${p.rev})</span></div>
        <div class="price-row"><span class="price-now">R${p.price.toLocaleString()}</span>${p.was?`<span class="price-was">R${p.was.toLocaleString()}</span><span class="price-pct">-${Math.round((1-p.price/p.was)*100)}%</span>`:''}</div>
      </div>
    </div>`).join(''):`<div style="grid-column:1/-1;text-align:center;padding:80px;color:var(--muted)"><div style="font-size:48px;margin-bottom:12px">🔍</div><p>No products found</p></div>`;
}
function doCat(c,btn){cat=c;document.querySelectorAll('.chip').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();}
function doSort(s){sort=s;render();}
function doSearch(v){q=v.toLowerCase();render();}
function toggleWL(e,id){e.stopPropagation();wl.has(id)?wl.delete(id):(wl.add(id),toast('❤️ Added to wishlist'));render();}
function addCart(e,id){
  e.stopPropagation();
  const p=P.find(x=>x.id===id);
  const ex=cart.find(x=>x.id===id);
  ex?ex.qty++:cart.push({...p,qty:1});
  updateCart();toast(`✓ ${p.name} added`);
  const b=document.getElementById('b'+id);
  if(b){b.textContent='Added ✓';b.classList.add('added');setTimeout(()=>{b.textContent='Add to Cart';b.classList.remove('added');},1500);}
}
function updateCart(){
  const total=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const count=cart.reduce((s,i)=>s+i.qty,0);
  document.getElementById('cartBadge').textContent=count;
  const db=document.getElementById('db');
  const df=document.getElementById('df');
  if(!cart.length){db.innerHTML=`<div class="empty-cart"><div class="empty-cart-icon">🛒</div><p style="color:var(--muted)">Your cart is empty</p></div>`;df.innerHTML='';return;}
  db.innerHTML=cart.map(i=>`
    <div class="ci">
      <img class="ci-img" src="${i.img}" onerror="this.src=''" alt="${i.name}">
      <div class="ci-info">
        <div class="ci-brand">${i.brand}</div>
        <div class="ci-name">${i.name}</div>
        <div class="ci-price">R${(i.price*i.qty).toLocaleString()}</div>
        <div class="qty-wrap">
          <button class="qb" onclick="chQty(${i.id},-1)">−</button>
          <div class="qv">${i.qty}</div>
          <button class="qb" onclick="chQty(${i.id},1)">+</button>
        </div>
      </div>
      <button class="rm" onclick="rmCart(${i.id})">×</button>
    </div>`).join('');
  df.innerHTML=`
    <div class="df-row"><span>Subtotal (${count} items)</span><span>R${total.toLocaleString()}</span></div>
    <div class="df-row"><span>Delivery</span><span style="color:var(--accent)">${total>=500?'FREE':'R80'}</span></div>
    <div class="df-total"><span>Total</span><span>R${(total+(total>=500?0:80)).toLocaleString()}</span></div>
    <button class="co-btn" onclick="checkout()">Checkout</button>
    <button class="cs-btn" onclick="toggleCart()">Continue Shopping</button>`;
}
function chQty(id,d){const i=cart.find(x=>x.id===id);if(!i)return;i.qty+=d;if(i.qty<=0)rmCart(id);else updateCart();}
function rmCart(id){cart=cart.filter(x=>x.id!==id);updateCart();}
function toggleCart(){document.getElementById('drawer').classList.toggle('open');document.getElementById('overlay').classList.toggle('open');}
function checkout(){toast('🎉 Order placed! Thank you for shopping with Nova');cart=[];updateCart();toggleCart();}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
render();updateCart();
</script>
</body>
</html>
